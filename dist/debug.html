<!DOCTYPE html>
<html>
<head>
  <title>Debug Test</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #eee; }
    .log { margin: 5px 0; padding: 10px; background: #16213e; border-radius: 4px; }
    .error { color: #ff6b6b; }
    .success { color: #51cf66; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>OpenClaw Debug</h1>
  <div id="logs"></div>
  <button onclick="testFetch()">Test API</button>
  <button onclick="testWS()">Test WebSocket</button>

  <script>
    function log(msg, type='info') {
      const div = document.createElement('div');
      div.className = 'log ' + type;
      div.textContent = new Date().toLocaleTimeString() + ' - ' + msg;
      document.getElementById('logs').appendChild(div);
    }

    log('Page loaded');
    log('Window location: ' + window.location.host);

    async function testFetch() {
      log('Testing API...');
      try {
        const r = await fetch('/api/health');
        const d = await r.json();
        log('API OK: ' + JSON.stringify(d), 'success');
      } catch (e) {
        log('API Error: ' + e, 'error');
      }
    }

    function testWS() {
      const wsUrl = 'ws://' + window.location.host + '/api';
      log('Connecting to ' + wsUrl);
      try {
        const ws = new WebSocket(wsUrl);
        ws.onopen = () => log('WebSocket connected!', 'success');
        ws.onerror = (e) => log('WebSocket error: ' + e, 'error');
        ws.onclose = (e) => log('WebSocket closed: ' + e.code + ' ' + e.reason, 'error');
      } catch (e) {
        log('WebSocket exception: ' + e, 'error');
      }
    }
  </script>
</body>
</html>
