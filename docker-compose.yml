version: '3.8'

services:
  openclaw-next:
    image: node:20-alpine
    container_name: openclaw-next
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "3000:3000"
      - "18789:18789"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    command: sh -c "npm ci --production && npm run serve"
    restart: unless-stopped
    networks:
      - openclaw-network

networks:
  openclaw-network:
    driver: bridge
